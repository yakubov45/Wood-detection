<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yog'och Nuqson Aniqlovchi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0c14;
    --surface: #111420;
    --card:    #161926;
    --border:  #242840;
    --primary: #6c63ff;
    --accent:  #4fc3f7;
    --success: #56cf6e;
    --warn:    #ffd43b;
    --danger:  #ff6b6b;
    --text:    #e8eaf6;
    --muted:   #7a85a3;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ─── Header ─────────────────────────── */
  header {
    background: linear-gradient(135deg, #13162a 0%, #0a0c14 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 40px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 4px 40px rgba(108,99,255,0.12);
    position: sticky; top: 0; z-index: 100;
  }
  .header-info h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.3px; }
  .header-info p  { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .badge {
    padding: 5px 14px; border-radius: 20px; font-size: 0.76rem; font-weight: 600;
    background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.4);
    color: #a5a0ff;
  }
  .badge.green {
    background: rgba(86,207,110,0.15); border-color: rgba(86,207,110,0.4); color: var(--success);
  }

  /* ─── Main Layout ─────────────────────── */
  main {
    max-width: 1120px; margin: 0 auto;
    padding: 36px 24px;
    display: grid;
    grid-template-columns: 440px 1fr;
    gap: 24px;
  }
  @media (max-width: 800px) { main { grid-template-columns: 1fr; } }

  /* ─── Cards ──────────────────────────── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.35);
  }
  .card-title {
    font-size: 0.85rem; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
  }
  .card-title::before {
    content: ''; width: 3px; height: 14px;
    background: var(--primary); border-radius: 2px;
  }

  /* ─── Drop Zone ──────────────────────── */
  #drop-zone {
    border: 2px dashed var(--border); border-radius: 14px;
    padding: 44px 20px; text-align: center; cursor: pointer;
    transition: all 0.3s ease;
  }
  #drop-zone:hover, #drop-zone.over {
    border-color: var(--primary);
    background: rgba(108,99,255,0.07);
  }
  .dz-icon { font-size: 2rem; margin-bottom: 12px; font-weight: bold; color: var(--primary); }
  .dz-text { color: var(--muted); font-size: 0.88rem; line-height: 1.6; }
  .dz-text b { color: var(--primary); }
  #file-input { display: none; }

  /* Preview */
  #preview-wrap { display: none; margin-top: 18px; position: relative; border-radius: 12px; overflow: hidden; }
  #preview-img  { width: 100%; max-height: 260px; object-fit: cover; display: block; }
  .img-info-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.75));
    padding: 12px 14px; font-size: 0.78rem; color: #ccc;
  }

  /* Predict Button */
  #predict-btn {
    margin-top: 18px; width: 100%; padding: 14px;
    border: none; border-radius: 12px;
    background: linear-gradient(135deg, var(--primary), #8b5cf6);
    color: white; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; transition: all 0.3s ease;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    letter-spacing: 0.3px;
  }
  #predict-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(108,99,255,0.45);
  }
  #predict-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; }

  /* ─── Results ─────────────────────────── */
  .empty-state {
    text-align: center; padding: 70px 20px; color: var(--muted);
  }
  .empty-state p { font-size: 0.88rem; line-height: 1.7; }

  /* Top Prediction */
  .top-pred {
    background: linear-gradient(135deg, rgba(108,99,255,0.12), rgba(79,195,247,0.08));
    border: 1px solid rgba(108,99,255,0.25);
    border-radius: 14px; padding: 24px; text-align: center; margin-bottom: 24px;
    animation: fadeUp 0.4s ease;
  }
  .top-pred .tp-label {
    font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .top-pred .tp-conf { font-size: 1rem; margin-top: 8px; font-weight: 600; }

  /* Bars */
  .prob-list { display: flex; flex-direction: column; gap: 12px; animation: fadeUp 0.5s ease; }
  .prob-header { display: flex; justify-content: space-between; font-size: 0.83rem; margin-bottom: 6px; }
  .prob-name { font-weight: 500; }
  .prob-pct  { color: var(--muted); }
  .bar-bg    { background: var(--surface); border-radius: 8px; height: 9px; overflow: hidden; }
  .bar-fill  {
    height: 100%; border-radius: 8px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    transition: width 0.9s cubic-bezier(0.4,0,0.2,1);
  }
  .bar-fill.top { background: linear-gradient(90deg, #56cf6e, #4fc3f7); }

  /* ─── Animations ──────────────────────── */
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(12px); }
    to   { opacity:1; transform: none; }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* ─── Footer ──────────────────────────── */
  footer {
    text-align: center; padding: 24px;
    color: var(--muted); font-size: 0.76rem;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="header-info">
    <h1>Yog'och Nuqson Aniqlovchi</h1>
    <p>Avtomatlashtirilgan Klassifikatsiya Tizimi</p>
  </div>
</header>

<main>
  <!-- ── Chap: Upload ─── -->
  <div>
    <div class="card">
      <div class="card-title">Rasm yuklash</div>

      <div id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div class="dz-icon">+</div>
        <div class="dz-text">
          Rasmni tanlash uchun shu yerni bosing<br>
          <span style="font-size:0.78rem;opacity:0.7;">JPG · PNG · WEBP · BMP</span>
        </div>
        <input type="file" id="file-input" accept="image/*"
               onchange="handleFile(this.files[0])"
               style="display:none;">
      </div>

      <div id="preview-wrap">
        <img id="preview-img" src="" alt="Preview">
        <div class="img-info-bar" id="img-info"></div>
      </div>

      <button id="predict-btn" disabled onclick="predict()">
        <span id="btn-text">Tahlil qilish</span>
      </button>
    </div>
  </div>

  <!-- ── O'ng: Natija ─── -->
  <div class="card" id="result-card">
    <div class="card-title">Bashorat natijasi</div>
    <div id="result-content">
      <div class="empty-state">
        <p>Chap tomonda rasm yuklang<br>va <b style="color:var(--primary);">Tahlil qilish</b> tugmasini bosing</p>
      </div>
    </div>
    <div id="heatmap-wrap" style="display:none; margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
      <div class="card-title">Grad-CAM Tahlili</div>
      <img id="heatmap-img" src="" alt="Heatmap" style="width:100%; border-radius:12px; object-fit:cover;">
    </div>
  </div>
</main>

<footer>
  Wood Defect Classification System
</footer>

<script>
const previewImg  = document.getElementById('preview-img');
const previewWrap = document.getElementById('preview-wrap');
const predictBtn  = document.getElementById('predict-btn');
const imgInfo     = document.getElementById('img-info');
let currentFile   = null;

function handleFile(file) {
  if (!file) return;
  currentFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    previewImg.src = ev.target.result;
    previewWrap.style.display = 'block';
    imgInfo.textContent = file.name + '  •  ' + (file.size/1024).toFixed(1) + ' KB';
    predictBtn.disabled = false;
  };
  reader.readAsDataURL(file);
  document.getElementById('result-content').innerHTML =
    '<div class="empty-state"><p>Rasm yuklandi. Tahlil qilishga tayyor!</p></div>';
  const heatmapWrap = document.getElementById('heatmap-wrap');
  if (heatmapWrap) heatmapWrap.style.display = 'none';
}

async function predict() {
  if (!currentFile) return;
  predictBtn.disabled = true;
  document.getElementById('btn-text').innerHTML = '<div class="spinner"></div>&nbsp;Tahlil qilinmoqda...';

  const fd = new FormData();
  fd.append('image', currentFile);
  // Default to backend selected model by omitting 'model' parameter

  try {
    const res  = await fetch('/predict', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    showResult(data);
  } catch(e) {
    document.getElementById('result-content').innerHTML = `
      <div class="empty-state">
        <p>Xato: ${e.message}</p>
      </div>`;
  } finally {
    predictBtn.disabled = false;
    document.getElementById('btn-text').textContent = 'Tahlil qilish';
  }
}

function showResult(data) {
  const pct   = (data.confidence * 100).toFixed(1);
  const color = data.confidence > 0.75 ? 'var(--success)' :
                data.confidence > 0.5  ? 'var(--warn)' : 'var(--danger)';

  const bars = data.all_probs.map((p, i) => {
    const pp = (p.prob * 100).toFixed(1);
    return `
      <div class="prob-item">
        <div class="prob-header">
          <span class="prob-name">${p.label.replace(/_/g,' ')}</span>
          <span class="prob-pct">${pp}%</span>
        </div>
        <div class="bar-bg">
          <div class="bar-fill ${i===0?'top':''}" style="width:${pp}%"></div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('result-content').innerHTML = `
    <div class="top-pred">
      <div class="tp-label">${data.label.replace(/_/g,' ')}</div>
      <div class="tp-conf" style="color:${color}">Ishonch darajasi: ${pct}%</div>
  </div>
  <div class="prob-list">${bars}</div>`;
  
  if (data.heatmap) {
    document.getElementById('heatmap-img').src = "data:image/jpeg;base64," + data.heatmap;
    document.getElementById('heatmap-wrap').style.display = 'block';
  } else {
    document.getElementById('heatmap-wrap').style.display = 'none';
  }
}
</script>
</body>
</html>
